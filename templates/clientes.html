{% extends "base.html" %}

{% block content %}

<h1>Clientes Cadastrados</h1>

<table border="1">

    <tr>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Email</th>
        <th>Empresa</th>
    </tr>

    {% for cliente in clientes %}
    <tr>
        <td>{{ cliente.nome }}</td>
        <td>{{ cliente.telefone }}</td>
        <td>{{ cliente.email }}</td>
        <td>{{ cliente.empresa }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
